<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: transparent !important;
}
iframe {
    width: 100%;
    height: 100%;
    border: 0;
}
</style>
</head>
<body>
<iframe id="frame"></iframe>
<script>
function parseTimeToMinutes(t) {
    const [h, m] = t.split(':').map(Number);
    return h * 60 + m;
}

async function load() {
    try {
        const res = await fetch('./weiblich_court3_sun.json', { cache: "no-store" });
        const schedule = await res.json();

        const now = new Date();
        const nowMin = now.getHours() * 60 + now.getMinutes();

        let active = null;

        for (const game of schedule) {
            const start = parseTimeToMinutes(game.start);
            const end = start + game.durationMin;

            if (nowMin >= start && nowMin < end) {
                active = game;
                break;
            }
        }

        const frame = document.getElementById('frame');

        if (active) {
            if (frame.src !== active.scoreUrl) {
                frame.src = active.scoreUrl;
            }
        } else {
            frame.src = "";
        }

    } catch (e) {
        console.error("Overlay error:", e);
    }
}

load();
setInterval(load, 15000);
</script>
</body>
</html>
